name: Deploy to DigitalOcean

on:
  push:
    branches: [ main ]  

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

     
      - name: Login to DO Registry
        uses: docker/login-action@v2
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DO_PAT }}
          password: ${{ secrets.DO_PAT }}


      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: registry.digitalocean.com/test-registry-fastapi/test-fastapi:latest


      - name: Deploy to Droplet
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            docker pull registry.digitalocean.com/test-registry-fastapi/test-fastapi:latest
            docker stop my-api || true
            docker rm -f my-api || true
            docker run -d --name my-api -p 80:8080 registry.digitalocean.com/test-registry-fastapi/test-fastapi:latest